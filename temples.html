<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Temple Album by Maylee Portales — a WDD 131 project featuring photos of Latter-day Saint temples from around the world.">
    <meta name="author" content="Maylee Portales Picazo">
    <title>Temple Album | WDD 131</title>

    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">

    <!--CSS links-->
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">

    <!--JS link-->
    <script src="scripts/temples.js" defer></script>
</head>
<body>
    <header>
        <h2>Temple Album</h2>
        <button id="menu-button" aria-label="Open menu" aria-expanded="false">&#9776;</button>
        <nav id="primary-nav">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Old</a></li>
                <li><a href="#">New</a></li>
                <li><a href="#">Large</a></li>
                <li><a href="#">Small</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Temples of the World</h1>

        <section class="album">
            <figure>
                <img src="images/temple-1.jpg" alt="Mendoza Argentina Temple" loading="lazy">
                <figcaption>Mendoza Argentina Temple</figcaption>
            </figure>
            <figure>
                <img src="images/temple-1.jpg" alt="Salt Lake Temple" loading="lazy">
                <figcaption>Salt Lake Temple</figcaption>
            </figure>
            <figure>
                <img src="images/temple-1.jpg" alt="Sao Paulo Temple" loading="lazy">
                <figcaption>Sao Paulo Temple</figcaption>
            </figure>
            <figure>
                <img src="images/temple-1.jpg" alt="Manti Utah Temple" loading="lazy">
                <figcaption>Manti Utah Temple</figcaption>
            </figure>
            <figure>
                <img src="images/temple-1.jpg" alt="Logan Utah Temple" loading="lazy">
                <figcaption>Logan Utah Temple</figcaption>
            </figure>
            <figure>
                <img src="images/temple-1.jpg" alt="Rome Italy Temple" loading="lazy">
                <figcaption>Rome Italy Temple</figcaption>
            </figure>
            <figure>
                <img src="images/temple-1.jpg" alt="Tokyo Japan Temple" loading="lazy">
                <figcaption>Tokyo Japan Temple</figcaption>
            </figure>
            <figure>
                <img src="images/temple-1.jpg" alt="Paris France Temple" loading="lazy">
                <figcaption>Paris France Temple</figcaption>
            </figure>
            <figure>
                <img src="images/temple-1.jpg" alt="Provo City Center Temple" loading="lazy">
                <figcaption>Provo City Center Temple</figcaption>
            </figure>
        </section>
    </main>

    <footer>
        <p>&copy; <span id="year"></span> 🌻 Maylee Picazo 🌻 Bahia, Brazil</p>
        <p id="lastModified"></p>
    </footer>

</html>
